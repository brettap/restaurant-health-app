<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metro Atlanta Restaurant Health Inspection Scores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f4;
      color: #1c1c1a;
      -webkit-font-smoothing: antialiased;
    }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; }
    .header { padding: 20px 20px 16px; border-bottom: 1px solid #e7e5e4; position: sticky; top: 0; background: #fff; z-index: 10; }
    .eyebrow { font-size: 13px; color: #78716c; margin-bottom: 4px; }
    .title { font-size: 22px; font-weight: 600; }
    .search { width: 100%; margin-top: 12px; padding: 10px 12px; font-size: 14px; border: 1px solid #e7e5e4; border-radius: 8px; outline: none; }
    .search:focus { border-color: #a8a29e; }
    .filters { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .pill { font-size: 12px; padding: 5px 12px; border-radius: 100px; border: 1px solid #e7e5e4; background: #fff; color: #78716c; cursor: pointer; }
    .pill.active { background: #1c1c1a; color: #fff; border-color: #1c1c1a; }
    .row { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid #f0efed; }
    .badge { flex-shrink: 0; width: 46px; height: 46px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .badge .g { font-size: 20px; font-weight: 600; line-height: 1; }
    .badge .s { font-size: 10px; margin-top: 2px; }
    .info { flex: 1; min-width: 0; }
    .name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 12px; color: #78716c; margin-top: 2px; }
    .loading, .empty { padding: 40px 20px; text-align: center; color: #78716c; font-size: 14px; }
    .detail { position: fixed; top: 0; right: -100%; width: 100%; max-width: 480px; height: 100vh; background: #fff; z-index: 100; transition: right 0.3s ease; overflow-y: auto; }
    .detail.open { right: 0; }
    .detail-header { padding: 20px; border-bottom: 1px solid #e7e5e4; position: sticky; top: 0; background: #fff; }
    .back-btn { font-size: 14px; color: #78716c; cursor: pointer; margin-bottom: 12px; display: inline-block; }
    .detail-name { font-size: 20px; font-weight: 600; }
    .detail-address { font-size: 13px; color: #78716c; margin-top: 4px; }
    .detail-county { font-size: 13px; color: #78716c; }
    .insp-block { padding: 16px 20px; border-bottom: 1px solid #f0efed; }
    .insp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .insp-score { font-size: 18px; font-weight: 600; }
    .insp-date { font-size: 13px; color: #78716c; }
    .insp-inspector { font-size: 12px; color: #a8a29e; margin-top: 2px; }
    .violation { background: #f9f8f7; border-radius: 6px; padding: 10px 12px; margin-top: 8px; font-size: 12px; }
    .viol-code { font-weight: 600; color: #1c1c1a; margin-bottom: 4px; }
    .viol-points { color: #dc2626; font-weight: 600; }
    .viol-status { color: #78716c; margin-top: 2px; }
    .viol-notes { color: #57534e; margin-top: 4px; font-style: italic; }
    .no-violations { font-size: 13px; color: #78716c; padding: 8px 0; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="eyebrow">Metro Atlanta </div>
      <div class="title">Restaurant Health Inspection Scores</div>
      <input type="text" class="search" id="search" placeholder="Search restaurants">
      <div class="filters" id="filters">
        <span class="pill active" data-county="all">All</span>
        <span class="pill" data-county="Cherokee">Cherokee</span>
        <span class="pill" data-county="Clayton">Clayton</span>
        <span class="pill" data-county="Cobb">Cobb</span>
        <span class="pill" data-county="DeKalb">DeKalb</span>
        <span class="pill" data-county="Douglas">Douglas</span>
        <span class="pill" data-county="Fayette">Fayette</span>
        <span class="pill" data-county="Forsyth">Forsyth</span>
        <span class="pill" data-county="Fulton">Fulton</span>
        <span class="pill" data-county="Gwinnett">Gwinnett</span>
        <span class="pill" data-county="Henry">Henry</span>
        <span class="pill" data-county="Newton">Newton</span>
        <span class="pill" data-county="Rockdale">Rockdale</span>
        <span class="pill" data-county="Walton">Walton</span>
      </div>
    </div>
    <div id="list"><div class="loading">Loading inspections…</div></div>
    <div class="detail" id="detail">
        <div class="detail-header">
            <span class="back-btn" id="back-btn">← Back</span>
            <div class="detail-name" id="detail-name"></div>
            <div class="detail-address" id="detail-address"></div>
            <div class="detail-county" id="detail-county"></div>
        </div>
        <div id="detail-body"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fmxgrdtunlzclmyedram.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_7jEcMBE0e09jo_Il_xAzAg_t2tCm6Lt";

    let allRows = [];
    let activeCounty = "all";
    let searchTerm = "";

    function deriveGrade(score) {
            if (score >= 90) return 'A';
            if (score >= 80) return 'B';
            if (score >= 70) return 'C';
            if (score !== null) return 'U';
            return null;
        }

    function gradeColors(grade) {
      if (grade === "A") return { bg: "#E1F5EE", fg: "#085041" };
      if (grade === "B") return { bg: "#FAEEDA", fg: "#633806" };
      if (grade === "C") return { bg: "#FCEBEB", fg: "#791F1F" };
      return { bg: "#F1EFE8", fg: "#444441" };
    }

    function formatDate(d) {
      if (!d) return "No date";
      const dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    async function loadData() {
            try {
                let allRestaurants = [];
                let offset = 0;

                while (true) {
                    const url = `${SUPABASE_URL}/rest/v1/latest_inspections?select=id,name,county,address,score,grade,inspection_date&limit=1000&offset=${offset}`;
                    const res = await fetch(url, {
                        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    const data = await res.json();
                    if (!Array.isArray(data) || data.length === 0) break;
                    allRestaurants.push(...data);
                    offset += 1000;
                }

                allRows = allRestaurants
                    .map(r => ({
                        id: r.id,
                        name: r.name,
                        county: r.county || "",
                        address: r.address || "",
                        score: r.score,
                        grade: r.grade || deriveGrade(r.score),
                        date: r.inspection_date
                    }))
                    .filter(r => r.score !== null)
                    .sort((a, b) => a.name.localeCompare(b.name));

                render();
            } catch (err) {
                document.getElementById("list").innerHTML = `<div class="empty">Couldn't load data. ${err.message}</div>`;
            }
        }

    function render() {
      const list = document.getElementById("list");
      let rows = allRows;

      if (activeCounty !== "all") rows = rows.filter(r => r.county === activeCounty);
      if (searchTerm) rows = rows.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()));

      if (rows.length === 0) {
        list.innerHTML = `<div class="empty">No restaurants match your search.</div>`;
        return;
      }

      

      list.innerHTML = rows.map((r, idx) => {
        const c = gradeColors(r.grade);
        return `
          <div class="row" data-idx="${idx}">
            <div class="badge" style="background:${c.bg}">
              <span class="g" style="color:${c.fg}">${r.grade || "?"}</span>
              <span class="s" style="color:${c.fg}">${r.score ?? ""}</span>
            </div>
            <div class="info">
              <div class="name">${r.name}</div>
              <div class="meta">${r.county} &middot; ${formatDate(r.date)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value; render(); });
    document.getElementById("filters").addEventListener("click", e => {
      if (!e.target.classList.contains("pill")) return;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      e.target.classList.add("active");
      activeCounty = e.target.dataset.county;
      render();
    });

    async function openDetail(restaurant) {
            // Set header info
            document.getElementById('detail-name').textContent = restaurant.name;
            document.getElementById('detail-address').textContent = restaurant.address;
            document.getElementById('detail-county').textContent = restaurant.county;
            document.getElementById('detail-body').innerHTML = '<div class="loading">Loading history…</div>';

            // Open the panel
            document.getElementById('detail').classList.add('open');

            // Fetch full inspection history
            // Fetch full inspection history
            const url = `${SUPABASE_URL}/rest/v1/inspections?select=id,score,inspection_date,inspection_purpose,inspector_name&restaurant_id=eq.${restaurant.id}&order=inspection_date.desc`;
            const res = await fetch(url, {
                headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const inspections = await res.json();

            if (!inspections.length) {
                document.getElementById('detail-body').innerHTML = '<div class="empty">No inspection history found.</div>';
                return;
            }

            // Fetch violations for all inspections
            const inspIds = inspections.map(i => i.id).join(',');
            const violUrl = `${SUPABASE_URL}/rest/v1/violations?select=inspection_id,violation_code,points,corrected_on_site,is_repeat,inspector_notes&inspection_id=in.(${inspIds})`;
            const violRes = await fetch(violUrl, {
                headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const allViolations = await violRes.json();

            // Group violations by inspection_id
            const violByInsp = {};
            allViolations.forEach(v => {
                if (!violByInsp[v.inspection_id]) violByInsp[v.inspection_id] = [];
                violByInsp[v.inspection_id].push(v);
            });

            document.getElementById('detail-body').innerHTML = inspections.map(insp => {
                const grade = deriveGrade(insp.score);
                const c = gradeColors(grade);
                const violations = violByInsp[insp.id] || [];

                return `
      <div class="insp-block">
        <div class="insp-header">
          <div class="badge" style="background:${c.bg}">
            <span class="g" style="color:${c.fg}">${grade || '?'}</span>
            <span class="s" style="color:${c.fg}">${insp.score ?? ''}</span>
          </div>
          <div>
            <div class="insp-score">${formatDate(insp.inspection_date)}</div>
            <div class="insp-inspector">${insp.inspector_name || ''} ${insp.inspection_purpose ? '· ' + insp.inspection_purpose : ''}</div>
          </div>
        </div>
        ${violations.length === 0
                        ? '<div class="no-violations">✓ No violations</div>'
                        : violations.map(v => `
            <div class="violation">
              <div class="viol-code">${v.violation_code || ''}</div>
              <div class="viol-status">
                <span class="viol-points">${v.points ? '-' + v.points + ' pts' : ''}</span>
                ${v.corrected_on_site ? ' · ✓ Corrected on site' : ''}
                ${v.is_repeat ? ' · ⚠ Repeat violation' : ''}
              </div>
              ${v.inspector_notes ? `<div class="viol-notes">${v.inspector_notes}</div>` : ''}
            </div>
          `).join('')
                    }
      </div>
    `;
            }).join('');
        }

        document.getElementById('back-btn').addEventListener('click', () => {
            document.getElementById('detail').classList.remove('open');
        });

        document.getElementById('list').addEventListener('click', e => {
            const row = e.target.closest('.row');
            if (!row) return;
            const idx = row.dataset.idx;
            const visibleRows = allRows
                .filter(r => activeCounty === 'all' || r.county === activeCounty)
                .filter(r => !searchTerm || r.name.toLowerCase().includes(searchTerm.toLowerCase()));
            openDetail(visibleRows[idx]);
        }); 

    loadData();
  </script>
</body>
</html>
