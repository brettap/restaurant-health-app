<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metro Atlanta Restaurant Health Inspection Scores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f4;
      color: #1c1c1a;
      -webkit-font-smoothing: antialiased;
    }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; }
    .header { padding: 20px 20px 16px; border-bottom: 1px solid #e7e5e4; position: sticky; top: 0; background: #fff; z-index: 10; }
    .eyebrow { font-size: 13px; color: #78716c; margin-bottom: 4px; }
    .title { font-size: 22px; font-weight: 600; }
    .search { width: 100%; margin-top: 12px; padding: 10px 12px; font-size: 14px; border: 1px solid #e7e5e4; border-radius: 8px; outline: none; }
    .search:focus { border-color: #a8a29e; }
    .filters { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .pill { font-size: 12px; padding: 5px 12px; border-radius: 100px; border: 1px solid #e7e5e4; background: #fff; color: #78716c; cursor: pointer; }
    .pill.active { background: #1c1c1a; color: #fff; border-color: #1c1c1a; }
    .row { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid #f0efed; }
    .badge { flex-shrink: 0; width: 46px; height: 46px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .badge .g { font-size: 20px; font-weight: 600; line-height: 1; }
    .badge .s { font-size: 10px; margin-top: 2px; }
    .info { flex: 1; min-width: 0; }
    .name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 12px; color: #78716c; margin-top: 2px; }
    .loading, .empty { padding: 40px 20px; text-align: center; color: #78716c; font-size: 14px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="eyebrow">Metro Atlanta </div>
      <div class="title">Restaurant Health Inspection Scores</div>
      <input type="text" class="search" id="search" placeholder="Search restaurants">
      <div class="filters" id="filters">
        <span class="pill active" data-county="all">All</span>
        <span class="pill" data-county="Cherokee">Cherokee</span>
        <span class="pill" data-county="Clayton">Clayton</span>
        <span class="pill" data-county="Cobb">Cobb</span>
        <span class="pill" data-county="DeKalb">DeKalb</span>
        <span class="pill" data-county="Douglas">Douglas</span>
        <span class="pill" data-county="Fayette">Fayette</span>
        <span class="pill" data-county="Forsyth">Forsyth</span>
        <span class="pill" data-county="Fulton">Fulton</span>
        <span class="pill" data-county="Gwinnett">Gwinnett</span>
        <span class="pill" data-county="Henry">Henry</span>
        <span class="pill" data-county="Newton">Newton</span>
        <span class="pill" data-county="Rockdale">Rockdale</span>
        <span class="pill" data-county="Walton">Walton</span>
      </div>
    </div>
    <div id="list"><div class="loading">Loading inspections…</div></div>
  </div>

  <script>
    const SUPABASE_URL = "https://fmxgrdtunlzclmyedram.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_7jEcMBE0e09jo_Il_xAzAg_t2tCm6Lt";

    let allRows = [];
    let activeCounty = "all";
    let searchTerm = "";

    function deriveGrade(score) {
            if (score >= 90) return 'A';
            if (score >= 80) return 'B';
            if (score >= 70) return 'C';
            if (score !== null) return 'U';
            return null;
        }

    function gradeColors(grade) {
      if (grade === "A") return { bg: "#E1F5EE", fg: "#085041" };
      if (grade === "B") return { bg: "#FAEEDA", fg: "#633806" };
      if (grade === "C") return { bg: "#FCEBEB", fg: "#791F1F" };
      return { bg: "#F1EFE8", fg: "#444441" };
    }

    function formatDate(d) {
      if (!d) return "No date";
      const dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    async function loadData() {
      try {
        // Get inspections joined with their restaurant
        const url = `${SUPABASE_URL}/rest/v1/inspections?select=score,grade,inspection_date,restaurants(name,address,county)&order=inspection_date.desc`;
        const res = await fetch(url, {
          headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
        });
        const data = await res.json();
        console.log("Supabase response:", data);

        allRows = data
          .filter(i => i.restaurants)
          .map(i => ({
            name: i.restaurants.name,
            address: i.restaurants.address || "",
            county: i.restaurants.county || "",
            score: i.score,
            grade: i.grade || deriveGrade(i.score),
            date: i.inspection_date
          }));

        render();
      } catch (err) {
        document.getElementById("list").innerHTML = `<div class="empty">Couldn't load data. ${err.message}</div>`;
      }
    }

    function render() {
      const list = document.getElementById("list");
      let rows = allRows;

      if (activeCounty !== "all") rows = rows.filter(r => r.county === activeCounty);
      if (searchTerm) rows = rows.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()));

      if (rows.length === 0) {
        list.innerHTML = `<div class="empty">No restaurants match your search.</div>`;
        return;
      }

      

      list.innerHTML = rows.map(r => {
        const c = gradeColors(r.grade);
        return `
          <div class="row">
            <div class="badge" style="background:${c.bg}">
              <span class="g" style="color:${c.fg}">${r.grade || "?"}</span>
              <span class="s" style="color:${c.fg}">${r.score ?? ""}</span>
            </div>
            <div class="info">
              <div class="name">${r.name}</div>
              <div class="meta">${r.county} &middot; ${formatDate(r.date)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value; render(); });
    document.getElementById("filters").addEventListener("click", e => {
      if (!e.target.classList.contains("pill")) return;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      e.target.classList.add("active");
      activeCounty = e.target.dataset.county;
      render();
    });

    loadData();
  </script>
</body>
</html>
